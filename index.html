<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>kly.se – Vädret, helt enkelt.</title>
  <meta name="description" content="Kolla väder, pollen och UV-index i Sverige och världen. Snabbt, exakt och reklamfritt." />
  
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#1f3fae">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23ffcc5a'/></svg>">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-orb orb-1" aria-hidden="true"></div>
  <div class="bg-orb orb-2" aria-hidden="true"></div>

  <header class="container py-3 kly-narrow">
    <div class="d-flex align-items-center justify-content-between gap-3">
      <a class="brand text-decoration-none text-white" href="/">
        <span class="brand-mark">kly.se</span>
        <div class="brand-tagline">Vädret, helt enkelt.</div>
      </a>

      <div class="search-wrap position-relative flex-grow-1">
        <div class="search-pill d-flex align-items-center gap-2">
          <i class="bi bi-search"></i>
          <input id="searchInput" class="search-input" type="text" placeholder="Sök stad, by eller plats..." autocomplete="off" />
        </div>
        <div id="searchResults" class="search-results" hidden></div>
      </div>

      <button id="btnGeo" class="icon-btn" title="Använd min plats" aria-label="Min plats">
        <i class="bi bi-geo-alt-fill"></i>
      </button>
    </div>
  </header>

  <main class="container pb-5 kly-narrow">
    
    <section class="hero-card mt-3">
      <div class="d-flex justify-content-between align-items-start">
        <div>
          <h2 class="hero-location m-0" id="placeName">Laddar...</h2>
          <div class="hero-meta" id="placeCounty">Söker plats</div>
        </div>
        <i id="heroIcon" class="bi bi-cloud-sun hero-icon text-white"></i>
      </div>

      <div class="d-flex align-items-end gap-3 mt-3">
        <div class="hero-temp"><span id="tempNow">--</span><span class="deg">°</span></div>
        <div class="pb-2">
          <div class="fw-bold fs-5" id="weatherCond">--</div>
          <div class="text-white-50 fw-semibold" id="feelsLike">Känns som --°</div>
        </div>
      </div>

      <div class="pill-grid mt-4">
        <div class="mini-pill"><i class="bi bi-wind"></i> <span id="wind">--</span> m/s</div>
        <div class="mini-pill"><i class="bi bi-droplet"></i> <span id="humidity">--</span>% fukt</div>
        <div class="mini-pill"><i class="bi bi-sunglasses"></i> UV: <span id="uvLevel">--</span></div>
        <div class="mini-pill"><i class="bi bi-cloud"></i> Moln: <span id="cloudCover">--</span>%</div>
      </div>
    </section>

    <section class="mt-3">
      <div class="summary-line-box">
        <i class="bi bi-info-circle-fill me-2 text-white-50"></i>
        <span id="rainSummaryText">Laddar vädersammanfattning...</span>
      </div>
    </section>

    <section id="rainGraphSection" class="mt-4" style="display: none;">
      <div class="glass-card p-3">
        <h3 class="fs-6 fw-bold mb-3">Regn nästa timmen</h3>
        <div id="rainGraph" class="rain-graph-container"></div>
      </div>
    </section>

    <section class="mt-4 glass-card p-0 overflow-hidden">
      <div class="p-3 border-bottom border-white-10">
        <h3 class="fs-6 fw-bold m-0">Idag & Imorgon</h3>
      </div>
      <div class="hourly-scroll p-3">
        <div id="hourlyRow" class="d-flex gap-2"></div>
      </div>
    </section>

    <section class="mt-4 glass-card p-0 overflow-hidden">
      <div class="p-3 border-bottom border-white-10">
        <h3 class="fs-6 fw-bold m-0">10-dygnsprognos</h3>
      </div>
      <div class="table-responsive">
        <table class="table table-borderless text-white m-0 outlook-table">
          <tbody id="outlookRows"></tbody>
        </table>
      </div>
    </section>

    <section class="mt-4 glass-card p-0 overflow-hidden" id="pollenSection">
      <div class="p-3 border-bottom border-white-10 d-flex justify-content-between">
        <h3 class="fs-6 fw-bold m-0">Pollenrapport</h3>
        <span id="pollenSource" class="badge bg-white text-dark rounded-pill">Global API</span>
      </div>
      <div class="p-3">
        <div id="pollenTop3"></div>
        <div id="pollenHidden" style="display: none;"></div>
        <button id="pollenToggleBtn" class="btn btn-sm btn-outline-light w-100 mt-2 fw-bold" style="display: none;">
          Visa alla <i class="bi bi-chevron-down"></i>
        </button>
      </div>
    </section>

  </main>
  <script src="./app.js"></script>
</body>
</html>
